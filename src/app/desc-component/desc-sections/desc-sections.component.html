<form [formGroup]="form">
  <div
    cdkDropList
    class="drag-box"
    (cdkDropListDropped)="sectionDragDrop($event)"
    >
  @for (sf of sections.controls; track $index) {
    @if (sf.value.type) {
      <div class="drag-box-section" cdkDrag>

        <div class="section-handle" cdkDragHandle>
          <svg width="24px" fill="currentColor" viewBox="0 0 24 24">
            <path d="M10 9h4V6h3l-5-5-5 5h3v3zm-1 1H6V7l-5 5 5 5v-3h3v-4zm14 2l-5-5v3h-3v4h3v3l5-5zm-9 3h-4v3H7l5 5 5-5h-3v-3z"></path>
            <path d="M0 0h24v24H0z" fill="none"></path>
          </svg>
        </div>

        @if (sf.value.type === 'body') {
          <app-desc-body
            class="width100"
            [sectionForm]="sf"
            [sectionIndex]="$index"
            (deleteSection)="deleteSection($event)"
            ></app-desc-body>
        }

        @if (sf.value.type === 'list') {
          <app-desc-items-section
            class="width100"
            [sectionForm]="sf"
            [sectionIndex]="$index"
            (deleteSection)="deleteSection($event)"
            ></app-desc-items-section>
        }

      </div>
    }
  }
  </div>
  <div class="form-group">
    <button type="button" class="btn btn-outline-primary" (click)="addBodySection()">
      <i class="fa fa-plus"></i>
      Add Body
    </button>
    <button type="button" class="btn btn-outline-primary" (click)="addItemsSection()">
      <i class="fa fa-plus"></i>
      Add List
    </button>
  </div>
</form>
